services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jeli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jeli}
      POSTGRES_DB: ${POSTGRES_DB:-jeli}
    ports:
      # * Хост-порт настраивается через POSTGRES_PORT в .env — на машине может быть занят локальным Postgres
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - jeli_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jeli} -d ${POSTGRES_DB:-jeli}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    env_file:
      - .env
    environment:
      # * Внутри docker-compose backend ходит в БД по имени сервиса "db", а не localhost из .env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jeli}:${POSTGRES_PASSWORD:-jeli}@db:5432/${POSTGRES_DB:-jeli}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  jeli_db_data:
