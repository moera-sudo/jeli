info:
  name: Delete
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{base_url}}/relationships/{{relationship_id}}"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: "См. пояснение в relationships/Update.yml про возможный пустой relationship_id."

runtime:
  scripts:
    - type: tests
      code: |
        test("deletes the relationship, or reports missing relationship_id from an earlier 404", function () {
          expect([204, 404, 405]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
