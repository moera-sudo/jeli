info:
  name: Delete
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{base_url}}/relationships/{{relationship_id}}"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
