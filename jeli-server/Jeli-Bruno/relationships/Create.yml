info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/relationships"
  body:
    type: json
    data: |-
      {
        "from_person_id": "{{person_id}}",
        "to_person_id": "{{target_person_id}}",
        "type": "child_of"
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    person_id/target_person_id могут уже быть напрямую связаны (persons/Create.yml создаёт их как
    parent/child) — тогда 409 DuplicateRelationshipError. persons/Delete.yml (раньше в этой же
    последовательности) удаляет тот узел, на который на тот момент указывает target_person_id —
    если это оказался тот же самый target_person_id, здесь получим 404.

runtime:
  scripts:
    - type: tests
      code: |
        test("creates the edge, reports a duplicate, or the node was deleted earlier in the run", function () {
          expect([200, 404, 409]).to.include(res.status);
        });
        if (res.status === 200) {
          test("created edge has the right type", function () {
            expect(res.body.type).to.equal("child_of");
          });
        }
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("relationship_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
