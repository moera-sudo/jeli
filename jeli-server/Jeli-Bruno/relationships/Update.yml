info:
  name: Update
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{base_url}}/relationships/{{relationship_id}}"
  body:
    type: json
    data: |-
      {
        "marriage_year": 2010,
        "marriage_end_reason": "divorce"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("applies the marriage history update", function () {
          expect(res.body.marriage_year).to.equal(2010);
          expect(res.body.marriage_end_reason).to.equal("divorce");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
