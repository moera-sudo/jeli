info:
  name: Update
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{base_url}}/relationships/{{relationship_id}}"
  body:
    type: json
    data: |-
      {
        "marriage_year": 2010,
        "marriage_end_reason": "divorce"
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    relationship_id захватывается relationships/Create.yml — если ТА создала 404 (её to_person_id
    к тому моменту уже удалён persons/Delete.yml), relationship_id остаётся пустым и URL
    схлопывается в /relationships/ → 405 вместо 200/404. Прогонять relationships/ отдельно от
    полной последовательности для чистого 200.

runtime:
  scripts:
    - type: tests
      code: |
        test("applies the update, or reports missing relationship_id from an earlier 404", function () {
          expect([200, 404, 405]).to.include(res.status);
        });
        if (res.status === 200) {
          test("marriage history fields are applied", function () {
            expect(res.body.marriage_year).to.equal(2010);
            expect(res.body.marriage_end_reason).to.equal("divorce");
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
