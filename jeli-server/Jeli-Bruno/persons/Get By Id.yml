info:
  name: Get By Id
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/persons/{{person_id}}"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns the person detail", function () {
          expect(res.body.id).to.equal(bru.getVar("person_id"));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
