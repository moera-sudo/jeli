info:
  name: Invite Code
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/persons/{{person_id}}/invite-code"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns a generated invite code", function () {
          expect(res.body.invite_code).to.be.a("string");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("invite_code", res.body.invite_code);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
