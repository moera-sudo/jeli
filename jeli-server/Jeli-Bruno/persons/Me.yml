info:
  name: Me
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/persons/me"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns the node linked to the current account", function () {
          expect(res.body.id).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
