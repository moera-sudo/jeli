info:
  name: Delete
  type: http
  seq: 6

http:
  method: DELETE
  url: "{{base_url}}/persons/{{target_person_id}}"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Удаляет target_person_id (создан persons/Create.yml, не привязан ни к какому аккаунту) — чисто
    каскадное удаление (linked_user_id IS NULL ветка), однозначный 204. Намеренно НЕ используем
    person_id здесь: с реальным вторым/третьим аккаунтом в коллекции (папка scenario/) у person_id
    теперь ЕСТЬ настоящий successor-кандидат (user3), так что удаление person_id реально передало бы
    владение всем деревом user1 и сломало бы все последующие запросы, которые считают person_id
    своим. Путь "self-unlink с передачей владения" — отдельная история, не про смок-тест удаления.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
