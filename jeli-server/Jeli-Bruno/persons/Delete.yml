info:
  name: Delete
  type: http
  seq: 6

http:
  method: DELETE
  url: "{{base_url}}/persons/{{person_id}}?new_owner_user_id={{collaborator_user_id}}"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Удаляет/отвязывает person_id — деструктивная операция, сломает последующие запросы этой же
    последовательности, которые тоже ссылаются на {{person_id}}. Держите последним в ручном прогоне,
    либо запускайте отдельно от остальной цепочки.

runtime:
  scripts:
    - type: tests
      code: |
        test("either unlinks/deletes (204) or requires a successor (409)", function () {
          expect([204, 409]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
