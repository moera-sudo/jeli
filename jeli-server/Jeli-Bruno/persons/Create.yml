info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/persons"
  body:
    type: json
    data: |-
      {
        "last_name": "Сейітов",
        "first_name": "Ержан",
        "patronymic": null,
        "gender": "male",
        "avatar_url": null,
        "is_alive": true,
        "birth_year_value": 1950,
        "birth_year_precision": "exact",
        "death_year_value": null,
        "death_year_precision": "unknown",
        "death_context": null,
        "birth_country": "KZ",
        "birth_region": "Алматы",
        "ru": "",
        "tribe": "",
        "zhuz": "",
        "source_type": "oral_tradition",
        "has_attached_file": false,
        "file_url": null,
        "relation": {
          "to_person_id": "{{person_id}}",
          "type": "parent",
          "marriage_year": null,
          "marriage_end_reason": null
        }
      }
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("creates person with generated id", function () {
          expect(res.body.id).to.be.a("string");
          expect(res.body.gender).to.equal("male");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("target_person_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
