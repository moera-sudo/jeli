info:
  name: Matches
  type: http
  seq: 10

http:
  method: GET
  url: "{{base_url}}/persons/{{person_id}}/matches"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns a list of match candidates", function () {
          expect(res.body).to.be.an("array");
        });
    - type: after-response
      code: |
        if (res.status === 200 && Array.isArray(res.body) && res.body.length > 0) {
          bru.setVar("match_id", res.body[0].id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
