info:
  name: Bloodline
  type: http
  seq: 8

http:
  method: GET
  url: "{{base_url}}/persons/{{person_id}}/bloodline"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns persons and relationships arrays", function () {
          expect(res.body.persons).to.be.an("array");
          expect(res.body.relationships).to.be.an("array");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
