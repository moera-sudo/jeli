info:
  name: Insert Between
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/persons/insert-between"
  body:
    type: json
    data: |-
      {
        "last_name": "Пропущенное",
        "first_name": "Поколение",
        "patronymic": null,
        "gender": "male",
        "avatar_url": null,
        "is_alive": false,
        "birth_year_value": 1920,
        "birth_year_precision": "decade",
        "death_year_value": 1980,
        "death_year_precision": "decade",
        "death_context": "unknown",
        "birth_country": "KZ",
        "birth_region": "",
        "ru": "",
        "tribe": "",
        "zhuz": "",
        "source_type": "oral_tradition",
        "has_attached_file": false,
        "file_url": null,
        "parent_id": "{{target_person_id}}",
        "child_id": "{{person_id}}"
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Требует существующего прямого child_of-ребра между child_id и parent_id — прогонять после
    persons/Create.yml (которая создаёт {{target_person_id}} как parent_of {{person_id}}).

runtime:
  scripts:
    - type: tests
      code: |
        test("inserts a new generation, or reports no direct edge exists", function () {
          expect([200, 409]).to.include(res.status);
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("target_person_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
