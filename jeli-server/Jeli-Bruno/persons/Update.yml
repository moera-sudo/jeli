info:
  name: Update
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{base_url}}/persons/{{person_id}}"
  body:
    type: json
    data: |-
      {
        "birth_region": "Шымкент",
        "birth_country": "KZ",
        "ru": "Найман"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("applies the partial update", function () {
          expect(res.body.birth_region).to.equal("Шымкент");
          expect(res.body.ru).to.equal("Найман");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
