info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "johndoe@example.com",
        "password": "string123"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns access and refresh tokens", function () {
          expect(res.body.access_token).to.be.a("string");
          expect(res.body.refresh_token).to.be.a("string");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("access_token", res.body.access_token);
          bru.setVar("refresh_token", res.body.refresh_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
