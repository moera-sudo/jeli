info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "user2@example.com",
        "password": "string123",
        "last_name": "Bystritskiy",
        "first_name": "Trofim",
        "patronymic": null,
        "graph_invite_code": ""
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // ! Захват переменных ТОЛЬКО при успехе — иначе на конфликте (409, email уже занят) сюда
        // ! запишется undefined и затрёт валидный токен, полученный ранее в этой же сессии прогона.
        if (res.status === 200) {
          bru.setVar("access_token", res.body.access_token);
          bru.setVar("refresh_token", res.body.refresh_token);
          bru.setVar("user_id", res.body.user.id);
        }
    - type: tests
      code: |-
        test("returns access and refresh tokens", function () {
          expect(res.body.access_token).to.be.a("string");
          expect(res.body.refresh_token).to.be.a("string");
        });
        test("returns created user with generated id", function () {
          expect(res.body.user.id).to.be.a("string");
          expect(res.body.user.last_name).to.equal("Bystritskiy");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
