info:
  name: Profile ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/users/profile/{{user_id}}"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns the public profile", function () {
          expect(res.body.id).to.equal(bru.getVar("user_id"));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
