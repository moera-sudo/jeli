info:
  name: health
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/health"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("service reports ok", function () {
          expect(res.body.status).to.equal("ok");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
