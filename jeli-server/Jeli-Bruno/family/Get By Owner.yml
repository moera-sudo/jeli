info:
  name: Get By Owner
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/family/{{user_id}}"
  auth:
    type: bearer
    token: "{{access_token_2}}"
  docs: "user2 читает family user1 — публичное чтение, консистентно с открытостью графа для поиска родственников."

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("another authenticated user can read it", function () {
          expect(res.body.owner_user_id).to.equal(bru.getVar("user_id"));
          expect(res.body.title).to.equal("История рода Сейітовых");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
