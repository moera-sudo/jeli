info:
  name: Get Mine
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/family"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns what was just upserted", function () {
          expect(res.body.title).to.equal("История рода Сейітовых");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
