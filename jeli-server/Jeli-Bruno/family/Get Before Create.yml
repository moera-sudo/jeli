info:
  name: Get Before Create
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/family"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: "404 на свежей БД (family ещё не создана); 200, если коллекция уже прогонялась ранее в этой же БД."

runtime:
  scripts:
    - type: tests
      code: |
        test("404 before first upsert, or 200 on a re-run", function () {
          expect([200, 404]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
