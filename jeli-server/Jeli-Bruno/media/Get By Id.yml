info:
  name: Get By Id
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/media/{{media_id}}"
  docs: >-
    GET /media/{id} намеренно БЕЗ авторизации (auth: none) — так же, как обычный <img src> в браузере,
    который не может передать Bearer-токен. Отдаёт сырые байты с Content-Type из БД.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("serves the file with the stored content-type", function () {
          expect(res.getHeader("content-type")).to.equal("image/png");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
