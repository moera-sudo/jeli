info:
  name: Search By Name
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/search?q=zhenya"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Подстрока из фамилии user2 (Zhenya, scenario/3), без учёта регистра. person_id должен быть
    реальным UUID — граф user2 уже создан в scenario/5, до того как эта папка (seq 13) запускается.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("finds user2 by a substring of their last name, case-insensitively", function () {
          const found = res.body.find((u) => u.id === bru.getVar("user_id_2"));
          expect(found).to.not.equal(undefined);
          expect(found.person_id).to.equal(bru.getVar("person_id_2"));
        });
        test("does not return yourself", function () {
          const self = res.body.find((u) => u.id === bru.getVar("user_id"));
          expect(self).to.equal(undefined);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
