info:
  name: Search No Match
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/search?q=zzz-no-such-substring-zzz"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns an empty list, not an error", function () {
          expect(res.body).to.deep.equal([]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
