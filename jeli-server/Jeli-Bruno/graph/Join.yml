info:
  name: Join
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/graph/join"
  body:
    type: json
    data: |-
      {
        "invite_code": "{{invite_code}}"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  scripts:
    - type: tests
      code: |
        test("joins by invite code, or reports it's unusable / already has a person", function () {
          expect([200, 404, 409]).to.include(res.status);
        });
        if (res.status === 200) {
          test("root person is linked to the current account", function () {
            expect(res.body.id).to.be.a("string");
            expect(res.body.linked_user_id).to.be.a("string");
          });
        }
    - type: after-response
      code: |
        // ! Только при успехе — иначе на конфликте/невалидном коде затрёт валидный person_id.
        if (res.status === 200) {
          bru.setVar("person_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
