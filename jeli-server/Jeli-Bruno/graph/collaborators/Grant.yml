info:
  name: Grant
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/graph/collaborators"
  body:
    type: json
    data: |-
      {
        "person_id": "{{target_person_id}}"
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    person_id должен принадлежать вашему графу И быть привязан к аккаунту ВТОРОГО пользователя
    (linked_user_id заполнен). В линейном прогоне одного пользователя {{target_person_id}} обычно
    не подходит (не привязан ни к кому) — заполните вручную person_id второго зарегистрированного
    аккаунта для реального теста этого запроса.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("grants collaborator access", function () {
          expect(res.body.collaborator_user_id).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
