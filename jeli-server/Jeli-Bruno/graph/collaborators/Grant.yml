info:
  name: Grant
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/graph/collaborators"
  body:
    type: json
    data: |-
      {
        "person_id": "{{collaborator_person_id}}"
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    collaborator_person_id заполняется сценарием scenario/12-15 (создаёт узел, присоединяет к нему
    user3) — прогоните папку scenario/ целиком перед этим запросом для реального 200.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("grants collaborator access", function () {
          expect(res.body.collaborator_user_id).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
