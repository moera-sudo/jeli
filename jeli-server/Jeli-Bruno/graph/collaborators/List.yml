info:
  name: List
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/graph/collaborators"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("returns a list of collaborators", function () {
          expect(res.body).to.be.an("array");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
