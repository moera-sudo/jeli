info:
  name: Verify Chat Cascade Deleted
  type: http
  seq: 7

http:
  method: GET
  url: "{{base_url}}/chats/{{chat_id}}/messages"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: "Чат и все его сообщения удалены каскадно (FK ondelete=CASCADE) — ожидаем 404 Chat not found."

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
