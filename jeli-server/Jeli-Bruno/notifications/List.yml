info:
  name: List
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/notifications"
  auth:
    type: bearer
    token: "{{access_token_2}}"
  docs: >-
    Проверяем от лица user2 (получатель сообщения из messenger/Send Message.yml). notifications.service
    ВСЕГДА пишет уведомление в БД независимо от того, был ли получатель онлайн для WS-пуша — поэтому
    его наличие здесь доказывает, что вся цепочка send_message -> create_notification сработала,
    даже без возможности проверить сам живой WS-пуш из CLI-раннера Bruno.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("user2 has a new_message notification about the chat", function () {
          const n = res.body.find((x) => x.type === "new_message" && x.payload.message_id === bru.getVar("message_id"));
          expect(n).to.not.equal(undefined);
          expect(n.payload.sender_id).to.equal(bru.getVar("user_id"));
          expect(n.is_read).to.equal(false);
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          const n = res.body.find((x) => x.type === "new_message" && x.payload.message_id === bru.getVar("message_id"));
          if (n) {
            bru.setVar("notification_id", n.id);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
