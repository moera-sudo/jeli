info:
  name: Reject
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/matches/{{match_id}}/reject"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Отклоняет тот же {{match_id}}, что уже мог быть подтверждён через Confirm.yml — см. пояснение там.

runtime:
  scripts:
    - type: tests
      code: |
        test("rejects the match, or reports it doesn't exist / is already resolved", function () {
          expect([200, 404, 409]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
