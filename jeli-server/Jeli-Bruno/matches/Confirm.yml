info:
  name: Confirm
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/matches/{{match_id}}/confirm"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    {{match_id}} к этому моменту — уже реальный, дважды подтверждённый матч из scenario/09-11
    (persons/Matches.yml на generic person_id обычно ничего не находит и не перезаписывает
    переменную). Поэтому здесь ожидаем 409 — матч уже полностью резолвлен.

runtime:
  scripts:
    - type: tests
      code: |
        test("confirms, or reports it's already resolved / doesn't exist", function () {
          expect([200, 404, 409]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
