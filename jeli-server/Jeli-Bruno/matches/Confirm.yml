info:
  name: Confirm
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/matches/{{match_id}}/confirm"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    {{match_id}} захватывается из persons/Matches.yml (первый найденный кандидат). Если алгоритм
    мэтчинга не нашёл ни одного кандидата к моменту прогона, ожидаем 404.

runtime:
  scripts:
    - type: tests
      code: |
        test("confirms the match, or reports it doesn't exist yet", function () {
          expect([200, 404]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
