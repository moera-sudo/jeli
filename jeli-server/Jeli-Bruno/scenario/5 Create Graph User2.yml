info:
  name: 5 Create Graph User2
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/graph/create"
  auth:
    type: bearer
    token: "{{access_token_2}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("creates root person for user2", function () {
          expect(res.body.id).to.be.a("string");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("person_id_2", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
