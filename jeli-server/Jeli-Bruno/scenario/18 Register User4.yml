info:
  name: 18 Register User4
  type: http
  seq: 18

http:
  method: POST
  url: "{{base_url}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "scenario.user4@example.com",
        "password": "string123",
        "last_name": "Duisenov",
        "first_name": "Rustem",
        "patronymic": null,
        "graph_invite_code": ""
      }
  auth: inherit
  docs: "Четвёртый аккаунт — независимое дерево, будет предложен в брак person_id (user1) через marriage-proposals."

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("access_token_4", res.body.access_token);
          bru.setVar("user_id_4", res.body.user.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
