info:
  name: 2 Create Graph User1
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/graph/create"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Создаёт дерево user1 здесь же (а не полагается на graph/Create.yml из другой папки, которая
    прогоняется позже) — иначе {{person_id}} ещё не существовал бы к моменту шага 6.
    graph/Create.yml, запущенный позже, корректно получит 409 (уже создан) — уже обработано её
    тестом-заглушкой.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("person_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
