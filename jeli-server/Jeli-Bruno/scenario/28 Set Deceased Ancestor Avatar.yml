info:
  name: 28 Set Deceased Ancestor Avatar
  type: http
  seq: 28

http:
  method: POST
  url: "{{base_url}}/persons/{{deceased_person_id}}/avatar"
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - assets/test-avatar.png
        contentType: image/png
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: "Прямое подтверждение требования из ТЗ: у умершего человека тоже отображается аватарка в узле, если её поставили."

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("deceased person keeps is_alive=false and gets a real avatar_url", function () {
          expect(res.body.is_alive).to.equal(false);
          expect(res.body.avatar_url).to.match(/^\/api\/media\/[0-9a-f-]{36}$/);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
