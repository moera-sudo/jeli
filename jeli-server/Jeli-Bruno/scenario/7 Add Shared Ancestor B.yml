info:
  name: 7 Add Shared Ancestor B
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/persons"
  body:
    type: json
    data: |-
      {
        "last_name": "Bekturov",
        "first_name": "Yerzhan",
        "patronymic": null,
        "gender": "male",
        "birth_country": "KZ",
        "birth_region": "Almaty",
        "source_type": "oral_tradition",
        "relation": {
          "to_person_id": "{{person_id_2}}",
          "type": "parent"
        }
      }
  auth:
    type: bearer
    token: "{{access_token_2}}"
  docs: "Тот же общий предок, добавлен со стороны user2 (person_id_2) — см. 04 Add Shared Ancestor A."

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("creates the shared ancestor on user2's side", function () {
          expect(res.body.id).to.be.a("string");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("shared_ancestor_b", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
