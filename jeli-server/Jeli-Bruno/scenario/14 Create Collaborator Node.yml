info:
  name: 14 Create Collaborator Node
  type: http
  seq: 14

http:
  method: POST
  url: "{{base_url}}/persons"
  body:
    type: json
    data: |-
      {
        "last_name": "Abenov",
        "first_name": "Kid",
        "patronymic": null,
        "gender": "male",
        "relation": {
          "to_person_id": "{{person_id}}",
          "type": "child"
        }
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Отдельный узел в дереве user1, который затем присоединит к себе user3 (13-15) — для
    проверки полного жизненного цикла делегирования прав (graph/collaborators/Grant, List, Revoke).

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("collaborator_person_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
