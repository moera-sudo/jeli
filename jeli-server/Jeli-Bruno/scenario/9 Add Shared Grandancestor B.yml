info:
  name: 9 Add Shared Grandancestor B
  type: http
  seq: 9

http:
  method: POST
  url: "{{base_url}}/persons"
  body:
    type: json
    data: |-
      {
        "last_name": "Bekturov",
        "first_name": "Saken",
        "patronymic": null,
        "gender": "male",
        "birth_country": "KZ",
        "birth_region": "Almaty",
        "birth_year_value": 1931,
        "birth_year_precision": "decade",
        "ru": "Shaprashty",
        "tribe": "Shaprashty",
        "zhuz": "ulyzhuz",
        "source_type": "family_document",
        "relation": {
          "to_person_id": "{{shared_ancestor_b}}",
          "type": "parent"
        }
      }
  auth:
    type: bearer
    token: "{{access_token_2}}"
  docs: "Тот же общий пра-предок, добавлен со стороны user2 — см. 06 Add Shared Grandancestor A."

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("creates the shared grandancestor on user2's side", function () {
          expect(res.body.id).to.be.a("string");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("shared_grandancestor_b", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
