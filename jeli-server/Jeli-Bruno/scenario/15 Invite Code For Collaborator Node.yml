info:
  name: 15 Invite Code For Collaborator Node
  type: http
  seq: 15

http:
  method: POST
  url: "{{base_url}}/persons/{{collaborator_person_id}}/invite-code"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("invite_code", res.body.invite_code);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
