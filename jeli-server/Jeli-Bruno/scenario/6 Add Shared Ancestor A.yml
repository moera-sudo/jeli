info:
  name: 6 Add Shared Ancestor A
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/persons"
  body:
    type: json
    data: |-
      {
        "last_name": "Bekturov",
        "first_name": "Yerzhan",
        "patronymic": null,
        "gender": "male",
        "birth_country": "KZ",
        "birth_region": "Almaty",
        "source_type": "oral_tradition",
        "relation": {
          "to_person_id": "{{person_id}}",
          "type": "parent"
        }
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Общий предок (гипотеза: одна и та же реальная персона), добавлен со стороны user1 (person_id).
    Имя/гео намеренно совпадают с 05 Add Shared Ancestor B — это и есть сценарий, который должен
    поймать алгоритм мэтчинга.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("creates the shared ancestor on user1's side", function () {
          expect(res.body.id).to.be.a("string");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("shared_ancestor_a", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
