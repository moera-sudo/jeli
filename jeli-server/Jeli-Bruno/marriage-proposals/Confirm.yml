info:
  name: Confirm
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/marriage-proposals/{{proposal_id}}/confirm"
  auth:
    type: bearer
    token: "{{access_token_4}}"
  docs: >-
    Подтверждает владелец ВТОРОЙ стороны — user4 (access_token_4, заполняется scenario/16-19).
    Прогонять после marriage-proposals/Create.yml, реально создавшего pending на invite_code_4.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("confirms the marriage from user4's side", function () {
          expect(res.body.status).to.equal("confirmed");
          expect(res.body.resulting_relationship_id).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
