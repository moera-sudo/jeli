info:
  name: Confirm
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/marriage-proposals/{{proposal_id}}/confirm"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Подтвердить может только владелец второй стороны (не person_a) — при линейном прогоне одним
    аккаунтом ожидаем 403 NotProposalResponderError, если target_invite_code вёл к чужому владельцу,
    либо 409, если уже подтверждено/отклонено.

runtime:
  scripts:
    - type: tests
      code: |
        test("confirms, or reports permission/already-resolved", function () {
          expect([200, 403, 409]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
