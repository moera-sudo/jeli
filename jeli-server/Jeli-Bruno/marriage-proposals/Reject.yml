info:
  name: Reject
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/marriage-proposals/{{proposal_id}}/reject"
  auth:
    type: bearer
    token: "{{access_token_4}}"
  docs: >-
    Прогоняется ПОСЛЕ Confirm.yml на той же proposal_id — ожидаем 409 ProposalAlreadyResolvedError
    (нельзя отклонить уже подтверждённый брак), это осознанный тест на этот путь, не баг.

runtime:
  scripts:
    - type: tests
      code: |
        test("rejects, or reports it's already resolved", function () {
          expect([200, 409]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
