info:
  name: Reject
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/marriage-proposals/{{proposal_id}}/reject"
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    Отклонить может только владелец второй стороны (не person_a) — см. пояснение в Confirm.yml.

runtime:
  scripts:
    - type: tests
      code: |
        test("rejects, or reports permission/already-resolved", function () {
          expect([200, 403, 409]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
