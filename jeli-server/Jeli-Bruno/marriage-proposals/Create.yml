info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/marriage-proposals"
  body:
    type: json
    data: |-
      {
        "person_a_id": "{{person_id}}",
        "target_invite_code": "{{invite_code}}",
        "marriage_year": 2015
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    {{invite_code}} захватывается из persons/Invite Code.yml — это код СВОЕГО ЖЕ узла ({{person_id}}),
    поэтому в линейном прогоне одним аккаунтом это по сути self-marriage → 409 SelfRelationshipError
    ("A person cannot be related to themselves"). Для реального 200/pending нужен invite-код узла
    ВТОРОГО зарегистрированного аккаунта — та же принципиальная граница, что и у
    graph/collaborators/Grant (второй аккаунт не воспроизводится в линейной цепочке одной сессии).

runtime:
  scripts:
    - type: tests
      code: |
        test("creates the proposal, or reports invalid code / self-target / a duplicate", function () {
          expect([200, 404, 409]).to.include(res.status);
        });
        if (res.status === 200) {
          test("proposal is pending or auto-confirmed", function () {
            expect(res.body.id).to.be.a("string");
            expect(["pending", "confirmed"]).to.include(res.body.status);
          });
        }
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("proposal_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
