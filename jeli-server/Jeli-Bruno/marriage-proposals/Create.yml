info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/marriage-proposals"
  body:
    type: json
    data: |-
      {
        "person_a_id": "{{person_id}}",
        "target_invite_code": "{{invite_code_4}}",
        "marriage_year": 2015
      }
  auth:
    type: bearer
    token: "{{access_token}}"
  docs: >-
    invite_code_4 — реальный код узла user4 (заполняется scenario/16-19, отдельная переменная от
    {{invite_code}}, который используется persons/Invite Code.yml/graph/Join для СВОЕГО ЖЕ узла —
    раньше обе цели ошибочно делили одну переменную, из-за чего этот запрос всегда бил себя же
    в 409 SelfRelationshipError). Прогоните scenario/ целиком для реального pending/confirmed.

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  scripts:
    - type: tests
      code: |
        test("creates a pending marriage proposal with user4's node", function () {
          expect(res.body.id).to.be.a("string");
          expect(res.body.status).to.equal("pending");
        });
    - type: after-response
      code: |
        if (res.status === 200) {
          bru.setVar("proposal_id", res.body.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
